version: "3.7"

services:
  app_proxy:
    environment:
      # El formato es: <id-del-manifiesto>_<nombre-del-servicio>_1
      APP_HOST: cmoraes-myst-node_server_1
      APP_PORT: 4449

  server:
    image: mysteriumnetwork/myst:latest
    user: "0:0"
    cap_add:
      - NET_ADMIN
    devices:
      - "/dev/net/tun:/dev/net/tun"
    volumes:
      - "${APP_DATA_DIR}/data:/var/lib/mysterium-node"
    restart: on-failure
    # El comando incluye la aceptación de términos para que el nodo arranque de inmediato
    command: service --agreed-terms-and-conditions
